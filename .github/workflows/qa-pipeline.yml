name: QA Pipeline de Testes

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  testes-automatizados:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v3

      - name: Configurar o java 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: 17

      - name: Configurar o Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Instalar e Iniciar o Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm start &

      - name: Iniciar o Backend (Spring Boot)
        working-directory: ./backend
        run: mvn spring-boot:run &

      - name: Aguardar os servidores iniciarem
        run: sleep 30

      # 6.5 Executa a Collection do Postman via Newman
      - name: Testes de API (Postman/Newman)
        run: npx newman run ./postman/manager-task.postman_collection.json

      - name: Executar Bateria de Testes (maven)
        working-directory: ./backend
        run: mvn clean test
